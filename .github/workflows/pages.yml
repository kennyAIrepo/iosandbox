# Deploy the static site (Hand Lab suite + demos) to GitHub Pages.
# One-time setup: repo Settings → Pages → Source = "GitHub Actions".
# The site then lives at https://<user>.github.io/<repo>/handlab.html
#
# Everything the lab needs is static or CDN-hosted (three.js + MediaPipe
# from jsdelivr/Google): no build step, the repo root IS the site.
# The copyrighted baked MP3 is gitignored so it never ships; handlab
# detects that and falls back to the built-in synth track.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
